name: PetitesBouchees
options:
  bundleIdPrefix: com.bnjdpn
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true
  developmentLanguage: fr
  defaultConfig: Release

settings:
  base:
    SWIFT_VERSION: "6.0"
    GENERATE_INFOPLIST_FILE: YES
    DEVELOPMENT_TEAM: 767SX34A7Z

targets:
  PetitesBouchees:
    type: application
    platform: iOS
    sources:
      - path: PetitesBouchees
    resources:
      - path: PetitesBouchees/Resources/Assets.xcassets
      - path: PetitesBouchees/Resources/PrivacyInfo.xcprivacy
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.bnjdpn.PetitesBouchees
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait"
        INFOPLIST_KEY_UIRequiresFullScreen: YES
        INFOPLIST_KEY_CFBundleDisplayName: "Petites Bouch\u00E9es"
        CODE_SIGN_ENTITLEMENTS: PetitesBouchees/PetitesBouchees.entitlements
        SWIFT_STRICT_CONCURRENCY: complete
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: YES
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 1
    entitlements:
      path: PetitesBouchees/PetitesBouchees.entitlements
      properties: {}
    dependencies: []
    scheme:
      testTargets:
        - PetitesBoucheesTests
        - PetitesBoucheesUITests
      gatherCoverageData: true

  PetitesBoucheesTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: PetitesBoucheesTests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.bnjdpn.PetitesBoucheesTests
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: PetitesBouchees

  PetitesBoucheesUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: PetitesBoucheesUITests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.bnjdpn.PetitesBoucheesUITests
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: PetitesBouchees
